          <text x="701" y="327" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#E8E1D0">Form · espace perso</text></g>

        <!-- Sub-nodes -->
        <g><rect x="210" y="416" width="160" height="48" rx="10" fill="#EEF3F1" stroke="#8FA5AB" stroke-width="1.5"></rect>
          <text x="290" y="437" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#3a4a44">DeepSeek</text>
          <text x="290" y="453" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="#5A625E">le cerveau (LLM)</text></g>
        <g><rect x="390" y="416" width="160" height="48" rx="10" fill="#EEF3F1" stroke="#8FA5AB" stroke-width="1.5"></rect>
          <text x="470" y="437" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#3a4a44">Notion</text>
          <text x="470" y="453" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="#5A625E">base des 120+ conférences</text></g>
      </svg>
