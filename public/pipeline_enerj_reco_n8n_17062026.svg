          <text x="753" y="103" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">IF · test conditionnel</text></g>
        <!-- Scrape -->
        <g><rect x="678" y="158" width="150" height="52" rx="10" fill="#fff" stroke="#2D5A4F" stroke-width="1.5"></rect>
          <text x="753" y="180" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">HTTP Request</text>
          <text x="753" y="197" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">scrape profil public</text></g>

