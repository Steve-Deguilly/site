<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 500" width="900" height="500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Schéma détaillé du workflow n8n">
        <defs>
          <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L7,3 L0,6 Z" fill="#2D5A4F"></path>
          </marker>
        </defs>

        <!-- ===== flux principal (vert) ===== -->
        <!-- Row A -->
        <line x1="164" y1="90"  x2="178" y2="90"  stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>
        <line x1="330" y1="90"  x2="344" y2="90"  stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>
        <line x1="496" y1="90"  x2="510" y2="90"  stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>
        <line x1="662" y1="90"  x2="676" y2="90"  stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>
        <!-- IF oui -> scrape (vertical) -->
        <line x1="753" y1="116" x2="753" y2="156" stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>
        <text x="762" y="140" font-family="Inter,sans-serif" font-size="11" fill="#2D5A4F" font-weight="700">oui</text>
        <!-- scrape -> fusion (polyline) -->
        <polyline points="753,210 753,250 89,250 89,286" fill="none" stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></polyline>
        <!-- IF non -> fusion (polyline) -->
        <polyline points="700,116 700,268 89,268 89,286" fill="none" stroke="#9aa79f" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ar)"></polyline>
        <text x="650" y="132" font-family="Inter,sans-serif" font-size="11" fill="#7d8a82" font-weight="700">non</text>
        <!-- Row B -->
        <line x1="164" y1="314" x2="206" y2="314" stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>
        <line x1="392" y1="314" x2="446" y2="314" stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>
        <line x1="602" y1="314" x2="616" y2="314" stroke="#2D5A4F" stroke-width="2" marker-end="url(#ar)"></line>

        <!-- ===== ressources de l'agent (gris pointillé) ===== -->
        <line x1="290" y1="416" x2="290" y2="350" stroke="#8FA5AB" stroke-width="1.8" stroke-dasharray="4 4"></line>
        <line x1="470" y1="416" x2="345" y2="350" stroke="#8FA5AB" stroke-width="1.8" stroke-dasharray="4 4"></line>
        <text x="232" y="388" font-family="Inter,sans-serif" font-size="10.5" fill="#4A6168" font-style="italic">Chat Model</text>
        <text x="430" y="388" font-family="Inter,sans-serif" font-size="10.5" fill="#4A6168" font-style="italic">Tool</text>

