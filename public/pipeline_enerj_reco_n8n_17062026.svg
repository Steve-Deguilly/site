        <g><rect x="446" y="288" width="156" height="52" rx="10" fill="#fff" stroke="#2D5A4F" stroke-width="1.5"></rect>
          <text x="524" y="310" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Parse AI Response</text>
          <text x="524" y="327" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">structuration</text></g>
        <g><rect x="616" y="288" width="170" height="52" rx="10" fill="#2D5A4F" stroke="#1F4138" stroke-width="1.5"></rect>
