<svg viewBox="0 132 1120 196" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">Chaîne d'automatisation de la prospection, par fonction</title>
  <desc id="dsc">Cinq maillons par fonction, indépendants des marques : une source de vérité (Notion, Airtable, Excel…), de l'orchestration (n8n, Make, Zapier…), un LLM souverain (Claude, Mistral), des livrables (brief du matin, relances), puis l'action validée par l'humain. La même mécanique quels que soient les outils.</desc>
  <style>
    .bg{fill:#F5F1EA;}
    .card{fill:#EBE5D9;stroke:#2D5A4F;stroke-width:1.5;}
    .card-ai{fill:#EBE5D9;stroke:#A55E2D;stroke-width:2;}
    .card-human{fill:#EBE5D9;stroke:#2D5A4F;stroke-width:2;stroke-dasharray:6 4;}
    .numc{fill:#2D5A4F;}
    .numc-ai{fill:#A55E2D;}
    .num{font-family:'JetBrains Mono',ui-monospace,monospace;fill:#F5F1EA;font-weight:700;font-size:13px;}
    .h{font-family:Inter,system-ui,sans-serif;fill:#1A2421;font-weight:600;font-size:14.5px;}
    .ex{font-family:'JetBrains Mono',ui-monospace,monospace;fill:#4A6168;font-size:10px;}
    .sub{font-family:Inter,system-ui,sans-serif;fill:#5A625E;font-size:11.5px;}
    .flow{stroke:#2D5A4F;stroke-width:2;fill:none;}

    @media (prefers-reduced-motion: no-preference){
      .step{opacity:0;animation:rise .55s ease-out forwards;}
      .s1{animation-delay:.10s;} .s2{animation-delay:.30s;} .s3{animation-delay:.50s;}
      .s4{animation-delay:.70s;} .s5{animation-delay:.90s;}
      .arr{opacity:0;animation:fade .4s ease-out forwards;}
      .a1{animation-delay:.26s;} .a2{animation-delay:.46s;} .a3{animation-delay:.66s;} .a4{animation-delay:.86s;}
      .pulse{transform-box:fill-box;transform-origin:center;animation:beat 2.6s ease-in-out 1.3s infinite;}
    }
    @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fade{to{opacity:1;}}
    @keyframes beat{0%,100%{stroke-width:2;}50%{stroke-width:3.4;}}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2D5A4F"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="450"/>

  <line class="flow arr a1" x1="216" y1="218" x2="246" y2="218" marker-end="url(#ah)"/>
  <line class="flow arr a2" x1="428" y1="218" x2="458" y2="218" marker-end="url(#ah)"/>
  <line class="flow arr a3" x1="640" y1="218" x2="670" y2="218" marker-end="url(#ah)"/>
  <line class="flow arr a4" x1="852" y1="218" x2="882" y2="218" marker-end="url(#ah)"/>

  <g class="step s1">
    <rect class="card" x="36" y="158" width="180" height="120" rx="14"/>
    <circle class="numc" cx="60" cy="182" r="13"/>
    <text class="num" x="60" y="187" text-anchor="middle">1</text>
    <text class="h" x="126" y="216" text-anchor="middle">Source de vérité</text>
    <text class="ex" x="126" y="240" text-anchor="middle">Notion · Airtable · Excel</text>
  </g>

  <g class="step s2">
    <rect class="card" x="248" y="158" width="180" height="120" rx="14"/>
    <circle class="numc" cx="272" cy="182" r="13"/>
    <text class="num" x="272" y="187" text-anchor="middle">2</text>
    <text class="h" x="338" y="216" text-anchor="middle">Orchestration</text>
    <text class="ex" x="338" y="240" text-anchor="middle">n8n · Make · Zapier</text>
  </g>

  <g class="step s3">
    <rect class="card-ai pulse" x="460" y="158" width="180" height="120" rx="14"/>
    <circle class="numc-ai" cx="484" cy="182" r="13"/>
    <text class="num" x="484" y="187" text-anchor="middle">3</text>
    <text class="h" x="550" y="216" text-anchor="middle">LLM souverain</text>
    <text class="ex" x="550" y="240" text-anchor="middle">Claude · Mistral</text>
  </g>

  <g class="step s4">
    <rect class="card" x="672" y="158" width="180" height="120" rx="14"/>
    <circle class="numc" cx="696" cy="182" r="13"/>
    <text class="num" x="696" y="187" text-anchor="middle">4</text>
    <text class="h" x="762" y="216" text-anchor="middle">Livrables</text>
    <text class="sub" x="762" y="240" text-anchor="middle">brief, relances</text>
  </g>

  <g class="step s5">
    <rect class="card-human" x="884" y="158" width="180" height="120" rx="14"/>
    <circle class="numc" cx="908" cy="182" r="13"/>
    <text class="num" x="908" y="187" text-anchor="middle">5</text>
    <text class="h" x="974" y="216" text-anchor="middle">Action validée</text>
    <text class="sub" x="974" y="240" text-anchor="middle">l'humain décide</text>
  </g>
</svg>
