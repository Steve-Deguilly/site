<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 360" width="900" height="360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Schéma du workflow n8n MMN : questionnaire santé, sauvegarde HDS, algorithme de profilage s'appuyant sur trois bases de connaissances (recettes et diététique, profils, sport), génération du bilan PDF puis envoi par email — chaîne automatisée et algorithmique, sans IA en production">
  <defs>
    <marker id="armmn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2D5A4F"></path>
    </marker>
  </defs>

  <!-- ===== flux principal (vert) ===== -->
  <!-- ligne 1 : Formulaire -> Sauvegarde -->
  <line x1="250" y1="61" x2="300" y2="61" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <!-- repli : Sauvegarde -> Algorithme (ligne 2, gauche) -->
  <polyline points="425,88 425,124 120,124 120,160" fill="none" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></polyline>
  <!-- ligne 2 : Algorithme -> Génération -> PDF -> Envoi -->
  <line x1="220" y1="187" x2="246" y2="187" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <line x1="446" y1="187" x2="472" y2="187" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <line x1="672" y1="187" x2="698" y2="187" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>

  <!-- ===== ressources de l'algorithme (gris pointillé, sans flèche) ===== -->
  <line x1="120" y1="214" x2="95"  y2="290" stroke="#8FA5AB" stroke-width="1.8" stroke-dasharray="4 4"></line>
  <line x1="120" y1="214" x2="255" y2="290" stroke="#8FA5AB" stroke-width="1.8" stroke-dasharray="4 4"></line>
  <line x1="120" y1="214" x2="404" y2="290" stroke="#8FA5AB" stroke-width="1.8" stroke-dasharray="4 4"></line>

  <!-- ===== NŒUDS ===== -->
  <!-- Ligne 1 -->
  <g><rect x="40" y="34" width="210" height="54" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="145" y="56" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Formulaire santé</text>
    <text x="145" y="73" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">questionnaire visiteur</text></g>

  <g><rect x="300" y="34" width="250" height="54" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="425" y="56" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Sauvegarde « brut »</text>
    <text x="425" y="73" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">Cloud HDS · réponse immédiate</text></g>

  <!-- Ligne 2 -->
  <g><rect x="20" y="160" width="200" height="54" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="120" y="182" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Algorithme de profilage</text>
    <text x="120" y="199" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">scoring déterministe</text></g>

  <g><rect x="246" y="160" width="200" height="54" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="346" y="182" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Génération du bilan</text>
    <text x="346" y="199" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">template → PDF (Gotenberg)</text></g>

  <g><rect x="472" y="160" width="200" height="54" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="572" y="182" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">PDF sécurisé + URL signée</text>
    <text x="572" y="199" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">bucket HDS · 7 jours</text></g>

  <g><rect x="698" y="160" width="200" height="54" rx="10" fill="#2D5A4F" stroke="#1F4138" stroke-width="1.5"></rect>
    <text x="798" y="182" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#ffffff">Bilan envoyé</text>
    <text x="798" y="199" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#E8E1D0">email automatique (Brevo)</text></g>

  <!-- Bases de connaissances (ressources grises) -->
  <g><rect x="20"  y="290" width="150" height="46" rx="9" fill="#EEF3F1" stroke="#8FA5AB" stroke-width="1.5"></rect>
    <text x="95"  y="312" text-anchor="middle" font-family="Inter,sans-serif" font-size="11.5" font-weight="700" fill="#3a4a44">KB Recettes &amp; Diet</text>
    <text x="95"  y="327" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A625E">base de connaissances</text></g>

  <g><rect x="185" y="290" width="140" height="46" rx="9" fill="#EEF3F1" stroke="#8FA5AB" stroke-width="1.5"></rect>
    <text x="255" y="312" text-anchor="middle" font-family="Inter,sans-serif" font-size="11.5" font-weight="700" fill="#3a4a44">KB Profils</text>
    <text x="255" y="327" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A625E">base de connaissances</text></g>

  <g><rect x="340" y="290" width="130" height="46" rx="9" fill="#EEF3F1" stroke="#8FA5AB" stroke-width="1.5"></rect>
    <text x="405" y="312" text-anchor="middle" font-family="Inter,sans-serif" font-size="11.5" font-weight="700" fill="#3a4a44">KB Sport</text>
    <text x="405" y="327" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A625E">base de connaissances</text></g>
</svg>
