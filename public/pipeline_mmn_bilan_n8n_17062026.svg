<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 300" width="900" height="300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Schéma du workflow n8n MMN : du questionnaire santé au bilan PDF envoyé, en chaîne automatisée et algorithmique">
  <defs>
    <marker id="armmn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2D5A4F"></path>
    </marker>
  </defs>

  <!-- ===== flux (vert) ===== -->
  <!-- haut : gauche -> droite -->
  <line x1="212" y1="68" x2="234" y2="68" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <line x1="438" y1="68" x2="460" y2="68" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <line x1="664" y1="68" x2="686" y2="68" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <!-- descente droite : N4 -> N5 -->
  <line x1="788" y1="98" x2="788" y2="218" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <!-- bas : droite -> gauche -->
  <line x1="686" y1="248" x2="664" y2="248" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>
  <line x1="460" y1="248" x2="438" y2="248" stroke="#2D5A4F" stroke-width="2" marker-end="url(#armmn)"></line>

  <!-- ===== NŒUDS ===== -->
  <!-- Ligne haute -->
  <g><rect x="10" y="40" width="200" height="56" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="110" y="62" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Formulaire santé</text>
    <text x="110" y="79" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">questionnaire visiteur</text></g>

  <g><rect x="236" y="40" width="200" height="56" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="336" y="62" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Sauvegarde « brut »</text>
    <text x="336" y="79" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">Cloud HDS · réponse immédiate</text></g>

  <g><rect x="462" y="40" width="200" height="56" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="562" y="62" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Algorithme de profilage</text>
    <text x="562" y="79" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">scoring déterministe</text></g>

  <g><rect x="688" y="40" width="200" height="56" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="788" y="62" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Croisement bases expertes</text>
    <text x="788" y="79" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">Airtable · âge · sédentarité · profil</text></g>

  <!-- Ligne basse (droite -> gauche) -->
  <g><rect x="688" y="220" width="200" height="56" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="788" y="242" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">Génération du bilan</text>
    <text x="788" y="259" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">template → PDF (Gotenberg)</text></g>

  <g><rect x="462" y="220" width="200" height="56" rx="10" fill="#ffffff" stroke="#2D5A4F" stroke-width="1.5"></rect>
    <text x="562" y="242" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#1F4138">PDF sécurisé + URL signée</text>
    <text x="562" y="259" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5A625E">bucket HDS · 7 jours</text></g>

  <g><rect x="236" y="220" width="200" height="56" rx="10" fill="#2D5A4F" stroke="#1F4138" stroke-width="1.5"></rect>
    <text x="336" y="242" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#ffffff">Bilan envoyé</text>
    <text x="336" y="259" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#E8E1D0">email automatique (Brevo)</text></g>
</svg>
